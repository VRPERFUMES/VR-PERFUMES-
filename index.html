<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR-PERFUMES | Premium Showcase</title>
    <style>
        :root { 
            --bg: #ffffff; 
            --gold: #d4af37;
            --tg-color: #0088cc; 
            --viber-color: #7360f2;
            --text-dark: #111111;
            --gray-light: #f5f5f5;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; 
            margin: 0; padding: 0; background: var(--bg); color: var(--text-dark); 
            padding-bottom: 90px; -webkit-tap-highlight-color: transparent;
        }

        .tt-hint { 
            background: #fff; color: #333; padding: 12px; text-align: center; font-size: 11px; 
            border-bottom: 1px solid #eee; line-height: 1.5; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;
        }

        /* --- ГЕРОЙ-СЛАЙДЕР (КОМПАКТНИЙ 135px) --- */
        .hero-carousel {
            position: relative; height: 135px; overflow: hidden; background: #000; border-bottom: 1px solid #1a1a1a; cursor: pointer;
        }
        .slide {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 1s ease-in-out; z-index: 1; pointer-events: none;
        }
        .slide.active { opacity: 1; z-index: 2; pointer-events: auto; }

        .logo-slide { background: #000; }
        .bg-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1; }
        .logo-slide .logo, .logo-slide h1 { position: relative; z-index: 2; }
        
        .week-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 0; filter: blur(2px) brightness(0.6); transform: scale(1.1); }
        .week-bottle { position: absolute; height: 130%; right: -10%; bottom: -15%; z-index: 1; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8)); object-fit: contain; }

        .logo { width: 55px; height: auto; margin-bottom: 8px; }
        .hero-carousel h1 { font-size: 13px; font-weight: 600; letter-spacing: 4px; margin: 0; color: var(--gold); text-transform: uppercase; }

        .banner-content { text-align: left; padding: 15px 25px; width: 100%; box-sizing: border-box; color: #fff; position: relative; z-index: 2; }
        .banner-subtitle { display: block; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); margin-bottom: 3px; }
        .banner-title { display: block; font-size: 24px; font-weight: 300; text-transform: uppercase; letter-spacing: 1px; line-height: 1.1; margin-bottom: 12px; font-family: Georgia, serif; }
        .banner-btn { display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase; padding: 5px 12px; border: 1px solid rgba(255,255,255,0.5); border-radius: 2px; background: rgba(0,0,0,0.3); }

        .news-ticker { background: var(--gold); color: #000; padding: 8px 0; overflow: hidden; white-space: nowrap; }
        .news-ticker-content { display: inline-block; padding-left: 100%; animation: ticker 25s linear infinite; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        /* --- КНОПКИ В ОДИН РЯД --- */
        .controls-wrapper { padding: 15px 15px 5px; position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid #eee; }
        .search-box { margin-bottom: 12px; }
        #searchInput { width: 100%; padding: 12px 15px; border: 1px solid #e0e0e0; background: var(--gray-light); font-size: 14px; outline: none; border-radius: 4px; box-sizing: border-box; }
        
        .action-buttons { display: flex; gap: 8px; margin-bottom: 15px; }
        .viber-link, .news-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; padding: 10px; border-radius: 4px; text-align: center; font-weight: 600; font-size: 11px; cursor: pointer; text-transform: uppercase; }
        .viber-link { background: var(--viber-color); color: #fff; }
        .news-btn { background: #fff; border: 1px solid #000; color: #000; }

        .tabs-container { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .tab-btn { background: none; border: none; font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 1px; padding: 5px 0; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: #000; border-bottom-color: var(--gold); }

        /* БРЕНДИ ТА ШРИФТИ */
        .brand-slider-wrapper { background: #fff; border-bottom: 1px solid #eee; padding: 15px 0; margin-bottom: 15px; }
        .brand-slider { display: flex; gap: 30px; overflow-x: auto; padding: 0 20px; scrollbar-width: none; align-items: center; }
        .brand-btn { background: none; border: none; cursor: pointer; white-space: nowrap; opacity: 0.4; transition: all 0.3s; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: 600; text-transform: uppercase; color: #000; padding: 5px 0; }
        .brand-btn.active { opacity: 1; transform: scale(1.05); }

        .brand-tf { font-family: 'Arial', sans-serif; font-weight: 900; letter-spacing: 1px; } 
        .brand-jm { font-family: 'Times New Roman', Times, serif; font-weight: 400; letter-spacing: 3px; } 
        .brand-creed { font-family: 'Georgia', serif; font-weight: 700; letter-spacing: 5px; border-top: 1px solid #000; border-bottom: 1px solid #000; padding: 2px 0; font-size: 11px; } 
        .brand-kilian { font-family: 'Georgia', serif; font-style: italic; text-transform: none; font-size: 17px; letter-spacing: 1px; } 
        .brand-mm { font-family: 'Helvetica Neue', sans-serif; font-weight: 300; letter-spacing: 4px; } 
        .brand-attar { font-family: 'Georgia', serif; font-variant: small-caps; letter-spacing: 2px; } 

        /* --- ПАРФУМ ТИЖНЯ (ЕЛЕГАНТНА СМУЖКА) --- */
        .week-card-container { display: none; padding: 0 15px 25px; }
        .week-card { background: #0a0a0a; color: #fff; border-radius: 6px; display: flex; align-items: center; padding: 12px 15px; gap: 15px; position: relative; border: 1px solid #222; cursor: pointer; overflow: hidden; }
        .week-card-img { width: 50px; height: 50px; object-fit: contain; z-index: 2; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
        .week-card-info { flex: 1; z-index: 2; }
        .week-card-label { color: var(--gold); font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 3px; display: block; }
        .week-card-name { font-size: 16px; font-family: Georgia, serif; line-height: 1.2; letter-spacing: 0.5px; }
        .week-card-bg-blur { position: absolute; right: -30px; top: -30px; width: 130px; height: 130px; background-size: cover; filter: blur(20px) opacity(0.3); z-index: 1; border-radius: 50%; }
        .week-arrow { color: var(--gold); font-size: 20px; z-index: 2; font-weight: 300; }

        /* КАТАЛОГ */
        #catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px 15px; padding: 0 15px 20px; }
        .card { position: relative; display: flex; flex-direction: column; background: #fff; text-align: center; }
        .badges-container { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 4px; z-index: 10; }
        .badge { padding: 4px 8px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border-radius: 2px; }
        .badge-new { background: #000; color: #fff; }
        .badge-top { background: var(--gold); color: #000; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; cursor: pointer; background: var(--gray-light); border-radius: 4px; }
        .brand { font-weight: 700; font-size: 10px; margin-top: 12px; text-transform: uppercase; color: #777; }
        .name { font-size: 13px; color: #111; height: 34px; margin: 6px 0 10px; overflow: hidden; line-height: 1.3; font-weight: 500; }
        .price-ml { font-size: 11px; color: #888; margin-bottom: 8px; }
        select { width: 100%; padding: 8px 10px; border: 1px solid #eee; margin-bottom: 12px; background: #fff; outline: none; font-size: 13px; border-radius: 4px; }
        .total { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: #000; }
        .order-btn { background: #000; color: #fff; border: none; padding: 12px; font-weight: 600; cursor: pointer; text-transform: uppercase; font-size: 11px; border-radius: 4px; transition: background 0.3s; }

        /* МОДАЛЬНІ ВІКНА */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: #fff; padding: 30px 25px; max-width: 400px; width: 100%; position: relative; text-align: left; max-height: 85vh; overflow-y: auto; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        .modal-content h3 { margin-top: 0; font-size: 18px; letter-spacing: 1px; text-transform: uppercase; font-family: Georgia, serif; text-align: center; }
        
        .modal-order-btn { display: none; background: var(--gold); color: #000; border: none; padding: 14px; width: 100%; margin-top: 25px; cursor: pointer; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; font-size: 12px; border-radius: 4px; text-align: center; text-decoration: none; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        .modal-frag-btn { display: none; background: transparent; border: 1px solid #ddd; color: #555; padding: 10px; width: 100%; margin-top: 10px; cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 10px; border-radius: 4px; text-align: center; text-decoration: none; }
        
        .close-btn { background: #f5f5f5; border: none; color: #000; padding: 12px; width: 100%; margin-top: 15px; cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 12px; border-radius: 4px; display: block; text-align: center;}
        
        .review-box { background: #f9f9f9; padding: 10px 15px; border-radius: 6px; margin-bottom: 10px; border-left: 3px solid #ccc; font-style: italic; font-size: 12px;}
        .review-box.pos { border-color: #28a745; }
        .review-box.neu { border-color: #ffc107; }
        .review-box.neg { border-color: #dc3545; }

        .fab-container { position: fixed; bottom: 20px; right: 15px; z-index: 999; }
        .fab { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--tg-color); }
        .fab img { width: 22px; filter: brightness(0) invert(1); }
    </style>
</head>
<body>

<div class="tt-hint">💡 Не переходить у Telegram? Натисніть <b>(⋯)</b> вгорі справа та оберіть <b>«Відкрити у браузері»</b>.</div>

<div class="hero-carousel" id="heroCarousel">
    <div class="slide logo-slide active">

    <div class="search-box"><input type="text" id="searchInput" placeholder="Пошук аромату..." oninput="filterCatalog()"></div>
    <div class="action-buttons">
        <a href="https://invite.viber.com/?g2=AQBjzS%2BM5uBAeFRYT57vm5okC%2BGV00WHPJgDJBWE9ptyotTAmhAhpYNBmtPwZxQe" class="viber-link">Viber Community</a>

    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="mB"></h3>
        <p id="mN" style="color:#666; font-size: 14px; margin-top: 0; text-align: center;"></p>

        <div id="mD" style="font-size:13px; line-height:1.6; color: #333; margin-top: 15px;"></div>

        <button class="close-btn" onclick="document.getElementById('newsModalWindow').style.display='none'">Закрити</button>

<div class="fab-container"><a href="https://t.me/viktoriia_viktoriia_r" class="fab"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png"></a></div>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpreeDVfMb9m8VoH2fWjx3-P4e2XjpeFabLSODfQIBaLcXUA9T9xWfk4v_6R89JLgR-lvd0gwEakwM/pub?gid=339534482&single=true&output=csv';
    const TG_NICK = 'viktoriia_viktoriia_r'; 
    let globalCatalog = [], currentCategory = 'all', currentBrand = ''; 

    function safeParseCSV(str) {
        let arr = []; let quote = false; let row = 0, col = 0;
        for (let c = 0; c < str.length; c++) {
            let cc = str[c], nc = str[c+1];
            arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
            if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
            if (cc == '"') { quote = !quote; continue; }
            if (cc == ',' && !quote) { ++col; continue; }
            if ((cc == '\n' || cc == '\r') && !quote) { if(arr[row][col]!=='') { row++; col=0; } continue; }
            arr[row][col] += cc;
        }
        return arr.map(r => r.map(v => v.trim()));
    }

    async function load() {
        try {
            const r = await fetch(SHEET_CSV + '&v=' + Date.now());
            const data = await r.text();
            const rows = safeParseCSV(data);
            if(rows[0][9]) document.getElementById('newsTicker').innerText = rows[0][9];
            
            let rawNews = (rows[0] && rows[0][10]) ? rows[0][10] : "Скоро тут з'являться наші новини! ✨";
            const processedNews = rawNews.replace(/\n/g, '<br>').replace(/\{(.*?)\}/g, (match, perfumeName) => {
                return `<span class="news-link" onclick="orderPerfumeFromNews('${perfumeName}')">${perfumeName}</span>`;
            });
            document.getElementById('newsModalContent').innerHTML = processedNews;

            const catalogData = rows.slice(1).filter(c => c[0]); 
            catalogData.sort((a, b) => {
                const dateA = new Date(a[6] || '2000-01-01');
                const dateB = new Date(b[6] || '2000-01-01');
                return dateB - dateA;
            });

            globalCatalog = catalogData.map(c => ({brand: c[0]||'', name: c[1]||'', desc: c[4]||''}));
            renderBrandSlider(globalCatalog);

            const today = new Date();
            const container = document.getElementById('catalog');
            container.innerHTML = '';
            let weekPerfume = null;

            catalogData.forEach(c => {
                const [brand, name, pStr, minStr, desc, img, dateStr, top, sDesc] = c;
                const price = parseFloat(pStr.replace(/,/g, '.')) || 0;
                const min = parseInt(minStr) || 2;
                const isWeek = top && top.toLowerCase().includes('тиждень');
                const isTop = top && top.toLowerCase().includes('топ');
                const cleanD = (isWeek && sDesc && sDesc.trim() !== '') ? sDesc : desc;
                
                let isNew = false;
                if (dateStr) {
                    const itemDate = new Date(dateStr);
                    if (!isNaN(itemDate)) {
                        const diffDays = (today - itemDate) / (1000 * 60 * 60 * 24);
                        if (diffDays >= 0 && diffDays <= 14) isNew = true;
                    }
                }

                const cleanB = brand.replace(/'/g,"’");
                const cleanN = name.replace(/'/g,"’");
                const cleanDescModal = cleanD ? cleanD.replace(/'/g, "’").replace(/"/g, "&quot;").replace(/\n/g, '<br>').replace(/\r/g, '') : "Опис скоро з’явиться...";

                if (isWeek) weekPerfume = { brand, name, cleanB, cleanN, cleanD: cleanDescModal, img, price, min };

                const div = document.createElement('div');
                div.className = 'card';
                div.setAttribute('data-search', (brand + ' ' + name).toLowerCase());
                div.setAttribute('data-new', isNew);
                div.setAttribute('data-top', isTop);
                div.setAttribute('data-brand', brand);

                let options = '';
                [2, 5, 10, 20].forEach(ml => { if(ml >= min) options += `<option value="${ml}">${ml} мл — ${Math.round(ml*price)} грн</option>`; });

                div.innerHTML = `
                    <div class="badges-container">${isNew ? '<div class="badge badge-new">Новинка</div>':''}${isTop ? '<div class="badge badge-top">Best Seller</div>':''}</div>
                    <img src="${img}" onclick="showModal('${cleanB}', '${cleanN}', '${cleanDescModal}')" onerror="this.src='https://i.postimg.cc/CxkmFFJ3/logo.png'">
                    <div class="brand">${brand}</div><div class="name">${name}</div>
                    <div class="price-ml">1 мл: <b>${Math.round(price)} грн</b></div>
                    <select onchange="updatePrice(this, ${price})">${options}</select>
                    <div class="total">${Math.round(min*price)} грн</div>
                    <button class="order-btn" onclick="order('${cleanB} ${cleanN}', this)">ЗАМОВИТИ</button>`;
                container.appendChild(div);
            });

            if (weekPerfume) {
                document.getElementById('weekSlideBg').style.backgroundImage = `url('${weekPerfume.img}')`;
                document.getElementById('weekSlideBottle').src = weekPerfume.img;
                document.getElementById('weekSlide').style.display = 'flex';
                const weekCont = document.getElementById('weekPerfumeContainer');
                weekCont.innerHTML = `
                    <div class="week-card" onclick="showModal('${weekPerfume.cleanB}', '${weekPerfume.cleanN}', '${weekPerfume.cleanD}', true)">
                        <div class="week-card-bg-blur" style="background-image: url('${weekPerfume.img}')"></div>
                        <img src="${weekPerfume.img}" class="week-card-img">
                        <div class="week-card-info">
                            <span class="week-card-label">ПАРФУМ ТИЖНЯ</span>
                            <div class="week-card-name">${weekPerfume.name}</div>
                        </div>
                        <div class="week-arrow">→</div>
                    </div>`;
                weekCont.style.display = 'block';
            }
            startHeroCarousel();
        } catch (e) { console.error(e); }
    }

    function renderBrandSlider(catalog) {
        const brands = [...new Set(catalog.map(c => c.brand))].filter(b => b && b.trim() !== '').sort();
        const slider = document.getElementById('brandSlider');
        slider.innerHTML = `<button class="brand-btn active" onclick="setBrand('', this)">УСІ БРЕНДИ</button>`;
        brands.forEach(b => { 
            let lowerB = b.toLowerCase();
            let c = lowerB.includes('tom ford') ? 'brand-tf' : lowerB.includes('jo malone') ? 'brand-jm' : lowerB.includes('creed') ? 'brand-creed' : lowerB.includes('kilian') ? 'brand-kilian' : (lowerB.includes('mancera') || lowerB.includes('montale')) ? 'brand-mm' : lowerB.includes('attar') ? 'brand-attar' : '';
            slider.innerHTML += `<button class="brand-btn ${c}" onclick="setBrand('${b}', this)">${b}</button>`; 
        });
    }

    function showModal(b, n, d, isWeek = false) {
        document.getElementById('mB').innerText = b;
        document.getElementById('mN').innerText = n;
        let f = d;
        // --- ФОРМАТУВАННЯ ТЕКСТУ ---
        f = f.replace(/(Стиль:)/gi, '<br><br><b style="color:var(--gold); text-transform:uppercase; font-size:12px; letter-spacing:1px;">$1</b>');
        f = f.replace(/(Піраміда аромату:)/gi, '<br><br><b style="color:var(--gold); text-transform:uppercase; font-size:12px; letter-spacing:1px;">$1</b>');
        f = f.replace(/(Верхні ноти:)/gi, '<br>• <b>$1</b>');
        f = f.replace(/(Ноти серця:)/gi, '<br>• <b>$1</b>');
        f = f.replace(/(Базові ноти:)/gi, '<br>• <b>$1</b>');
        f = f.replace(/(Основні акорди:)/gi, '<br><br><b>$1</b>');
        f = f.replace(/(Відгуки:)/gi, '<br><br><h4 style="color:var(--gold); margin:0 0 10px; font-size: 15px; text-transform:uppercase;">💬 Відгуки покупців:</h4>');
        f = f.replace(/\[\+\](.*?)(?=<br>|\[\=\]|\[\-\]|$)/g, '<div class="review-box pos">🟢 $1</div>');
        f = f.replace(/\[\=\](.*?)(?=<br>|\[\+\]|\[\-\]|$)/g, '<div class="review-box neu">🟡 $1</div>');
        f = f.replace(/\[\-\](.*?)(?=<br>|\[\+\]|\[\=\]|$)/g, '<div class="review-box neg">🔴 $1</div>');
        
        document.getElementById('mD').innerHTML = f;

        const orderBtn = document.getElementById('modalOrderBtn');
        const fragBtn = document.getElementById('modalFragBtn');

        if (isWeek) {
            orderBtn.style.display = 'block';
            fragBtn.style.display = 'block';
            const orderText = `🛍️ ЗАМОВЛЕННЯ (Парфум тижня):\n${b} ${n}\n\nВікторіє, доброго дня! Бажаю замовити цей особливий аромат тижня. ✨`;
            orderBtn.href = `https://t.me/${TG_NICK}?text=${encodeURIComponent(orderText)}`;
            fragBtn.href = `https://www.fragrantica.ua/search/?query=${encodeURIComponent(b + ' ' + n)}`;
        } else {
            orderBtn.style.display = 'none';
            fragBtn.style.display = 'none';
        }
        
        document.getElementById('infoModal').style.display = 'flex';
    }

    function updatePrice(sel, p) { sel.nextElementSibling.innerText = Math.round(sel.value * p) + ' грн'; }
    function setBrand(brand, btn) { currentBrand = brand; document.querySelectorAll('.brand-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); filterCatalog(); window.scrollTo({ top: document.getElementById('stickyControls').offsetTop - 10, behavior: 'smooth' }); }
    function setCategory(cat, btn) { currentCategory = cat; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); filterCatalog(); window.scrollTo({ top: document.getElementById('stickyControls').offsetTop - 10, behavior: 'smooth' }); }
    function filterCatalog() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            const mS = c.getAttribute('data-search').includes(q);
            const mC = currentCategory === 'all' || (currentCategory === 'new' && c.getAttribute('data-new') === 'true') || (currentCategory === 'top' && c.getAttribute('data-top') === 'true');
            const mB = currentBrand === '' || c.getAttribute('data-brand') === currentBrand;
            c.style.display = (mS && mC && mB) ? 'flex' : 'none';
        });
    }

    function startHeroCarousel() {
        const slides = document.querySelectorAll('#heroCarousel .slide');
        let cur = 0; setInterval(() => { slides[cur].classList.remove('active'); cur = (cur + 1) % slides.length; slides[cur].classList.add('active'); }, 5000);
    }

    function order(item, btn) {
        const ml = btn.previousElementSibling.previousElementSibling.value;
        const total = btn.previousElementSibling.innerText;
        const text = `🛍️ ЗАМОВЛЕННЯ:\n${item}\nОб'єм: ${ml} мл\nСума: ${total}\n\nВікторіє, доброго дня! Підкажіть, будь ласка, чи є цей аромат у наявності та реквізити для оплати? ✨`;
        window.open(`https://t.me/${TG_NICK}?text=${encodeURIComponent(text)}`, '_top');
    }

    function orderPerfumeFromNews(q) {
        const text = `🛍️ ЗАМОВЛЕННЯ З НОВИН\n\nАромат: ${q}\n\nВікторіє, хочу уточнити наявність цього аромату та які об'єми доступні для розпиву? 📩`;
        window.open(`https://t.me/${TG_NICK}?text=${encodeURIComponent(text)}`, '_top');
    }

    function navigateToCategory(c) { const btn = document.getElementById('tab-' + c); if(btn) setCategory(c, btn); }
    function scrollToWeek() { document.getElementById('weekPerfumeContainer').scrollIntoView({behavior: 'smooth', block: 'start'}); }

    load();
</script>
</body>
</html>
