<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR-PERFUMES | Каталог</title>
    <style>
        :root { --main-color: #449244; --viber-color: #7360f2; --bg-color: #f8f9fa; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 10px; background: var(--bg-color); }
        header { text-align: center; padding: 20px 0; }
        .logo-img { width: 120px; height: auto; }
        h1 { font-size: 22px; text-transform: uppercase; margin: 10px 0 0; }
        .viber-main { display: block; background: var(--viber-color); color: #fff; text-decoration: none; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; margin: 15px 0; }
        .zoom-box { background: #fff; padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 10px; border: 1px solid #ddd; margin-bottom: 20px; font-size: 12px; }
        #range { flex-grow: 1; }
        #catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 15px; }
        .card { background: #fff; border-radius: 15px; padding: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; cursor: pointer; background: #eee; }
        .brand { font-weight: bold; font-size: 12px; margin: 8px 0 2px; text-transform: uppercase; }
        .p-name { font-size: 12px; color: #666; min-height: 32px; margin-bottom: 8px; }
        .price-ml { color: var(--main-color); font-weight: bold; font-size: 11px; margin-bottom: 10px; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 10px; }
        .price-tag { font-size: 18px; font-weight: 800; text-align: center; margin-bottom: 12px; }
        .order-btn { background: #000; color: #fff; text-decoration: none; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 13px; }
        .modal { display: none; position: fixed; z-index: 1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; }
        .modal-content { background:#fff; padding:25px; border-radius:20px; width:90%; max-width:400px; position:relative; }
        .close { position:absolute; right:15px; top:10px; font-size:30px; cursor:pointer; color:#aaa; }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/CxkmFFJ3/logo.png" alt="VR-PERFUMES" class="logo-img">
    <h1>VR-PERFUMES</h1>
    <div style="font-size: 10px; color: #999;">Ексклюзивний розпив • Хмельницький</div>
</header>

<a href="https://invite.viber.com/?g2=AQBjzS%2BM5uBAeFRYT57vm5okC%2BGV00WHPJgDJBWE9ptyotTAmhAhpYNBmtPwZxQe" class="viber-main">ПРИЄДНАТИСЬ ДО VIBER</a>

<div class="zoom-box">
    <span>МАСШТАБ:</span>
    <input type="range" min="140" max="280" value="165" id="range">
</div>

<div id="catalog">Завантаження ароматів...</div>

<div id="infoModal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close" onclick="document.getElementById('infoModal').style.display='none'">&times;</span>
        <h3 id="mTitle"></h3>
        <p id="mText"></p>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpreeDVfMb9m8VoH2fWjx3-P4e2XjpeFabLSODfQIBaLcXUA9T9xWfk4v_6R89JLgR-lvd0gwEakwM/pub?gid=339534482&single=true&output=csv';
    
    async function init() {
        try {
            const response = await fetch(SHEET_URL + '&cache=' + Date.now());
            const text = await response.text();
            
            // Складний розбір рядків (враховуємо переноси всередині комірок)
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { currentRow.push(currentField.trim()); currentField = ''; }
                else if (char === '\n' && !inQuotes) { 
                    currentRow.push(currentField.trim()); 
                    rows.push(currentRow); 
                    currentRow = []; 
                    currentField = ''; 
                }
                else currentField += char;
            }

            const container = document.getElementById('catalog');
            container.innerHTML = '';

            // Починаємо з 1-го рядка (пропускаємо заголовок)
            for (let i = 1; i < rows.length; i++) {
                const r = rows[i];
                if (r.length < 3) continue;

                const brand = (r[0] || '').replace(/^"|"$/g, '');
                const name = (r[1] || '').replace(/^"|"$/g, '');
                const price = parseFloat((r[2] || '').replace(',', '.'));
                const notes = (r[3] || '').replace(/^"|"$/g, '');
                const img = (r[4] || '').replace(/^"|"$/g, '').trim();

                if (isNaN(price)) continue;

                const card = document.createElement('div');
                card.className = 'card';
                
                let opts = '';
                [2, 5, 10].forEach(ml => {
                    let p = Math.round(ml * price);
                    if (ml === 10) p = Math.round(p * 0.9);
                    opts += `<option value="${ml}" data-p="${p}">${ml} мл — ${p} грн</option>`;
                });

                card.innerHTML = `
                    <img src="${img}" onerror="this.src='https://via.placeholder.com/300?text=VR+PERFUMES'" 
                         onclick="showInfo(\`${brand} ${name}\`, \`${notes}\`)">
                    <div class="brand">${brand}</div>
                    <div class="p-name">${name}</div>
                    <div class="price-ml">${Math.round(price)} грн / мл</div>
                    <select onchange="this.nextElementSibling.innerText = this.options[this.selectedIndex].getAttribute('data-p') + ' грн'">${opts}</select>
                    <div class="price-tag">${Math.round(2 * price)} грн</div>
                    <a href="#" class="order-btn" onclick="sendOrder('${brand} ${name}', this)">ЗАМОВИТИ</a>
                `;
                container.appendChild(card);
            }
        } catch (err) {
            document.getElementById('catalog').innerText = 'Помилка завантаження. Спробуйте пізніше.';
        }
    }

    function showInfo(title, text) {
        document.getElementById('mTitle').innerText = title;
        document.getElementById('mText').innerText = text;
        document.getElementById('infoModal').style.display = 'flex';
