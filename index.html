<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR-PERFUMES</title>
    <style>
        :root { --main: #449244; --viber: #7360f2; --bg: #f4f4f4; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 10px; background: var(--bg); }
        header { text-align: center; padding: 15px; background: #fff; border-radius: 15px; margin-bottom: 10px; }
        .logo { width: 80px; height: auto; }
        .search-box { position: sticky; top: 10px; z-index: 100; background: #fff; padding: 12px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 2px solid var(--viber); }
        #searchInput { width: 100%; padding: 10px; border: none; font-size: 16px; outline: none; font-weight: bold; }
        #catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; min-height: 200px; }
        .card { position: relative; border-radius: 15px; padding: 10px; display: flex; flex-direction: column; background: #fff; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .new-badge { position: absolute; top: -5px; left: 50%; transform: translateX(-50%); background: var(--main); color: white; padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: bold; z-index: 10; border: 1px solid #fff; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; cursor: pointer; }
        .brand { font-weight: bold; font-size: 13px; margin-top: 10px; text-transform: uppercase; }
        .name { font-size: 12px; color: #666; height: 32px; margin: 4px 0; overflow: hidden; }
        select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; }
        .total { font-size: 18px; font-weight: 900; margin-bottom: 10px; }
        .order-btn { background: #000; color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; }
        .error-msg { background: #ffeded; color: #d00; padding: 20px; border-radius: 15px; text-align: center; grid-column: 1/-1; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; max-width: 400px; width: 100%; position: relative; }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/CxkmFFJ3/logo.png" class="logo">
    <h1 style="font-size:20px; margin:5px 0;">VR-PERFUMES</h1>
    <button onclick="location.reload(true)" style="font-size: 10px; background: none; border: 1px solid #ccc; border-radius: 5px; padding: 2px 5px;">Оновити сайт</button>
</header>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="🔎 Пошук бренду або назви..." oninput="filterCatalog()">
</div>

<div id="catalog">Завантаження ароматів...</div>

<div id="infoModal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="modalBrand"></h3>
        <p id="modalName" style="color:#666;"></p>
        <hr border="0" style="height:1px; background:#eee; margin:15px 0;">
        <p id="modalDesc" style="line-height:1.6; font-size:14px; text-align:left;"></p>
    </div>
</div>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpreeDVfMb9m8VoH2fWjx3-P4e2XjpeFabLSODfQIBaLcXUA9T9xWfk4v_6R89JLgR-lvd0gwEakwM/pub?gid=339534482&single=true&output=csv';

    async function loadCatalog() {
        const container = document.getElementById('catalog');
        try {
            const r = await fetch(SHEET_CSV + '&nocache=' + Date.now());
            if (!r.ok) throw new Error("Немає доступу до Google Таблиці");
            
            const text = await r.text();
            const rows = text.split('\n').slice(1).map(line => {
                return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
            }).filter(c => c.length >= 3 && c[0]);

            if (rows.length === 0) {
                container.innerHTML = '<div class="error-msg">Таблиця порожня або некоректно опублікована.</div>';
                return;
            }

            // Сортування
            rows.sort((a, b) => new Date(b[6] || 0) - new Date(a[6] || 0));

            container.innerHTML = '';
            const today = new Date();

            rows.forEach(c => {
                const [brand, name, priceStr, minStr, desc, img, dateStr] = c;
                const price = parseFloat(priceStr.replace(',', '.')) || 0;
                const min = parseInt(minStr) || 2;
                const date = new Date(dateStr || 0);
                const isNew = (today - date) / (1000 * 60 * 60 * 24) <= 14;

                let options = '';
                [2, 5, 10].forEach(ml => {
                    if (ml >= min) options += `<option value="${ml}" data-p="${Math.round(ml*price)}">${ml} мл — ${Math.round(ml*price)} грн</option>`;
                });

                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-search', (brand + ' ' + name).toLowerCase());
                card.innerHTML = `
                    ${isNew ? '<div class="new-badge">Новинка!</div>' : ''}
                    <img src="${img}" onclick="showInfo('${brand}','${name}','${desc.replace(/'/g,"")}')" onerror="this.src='https://i.postimg.cc/CxkmFFJ3/logo.png'">
                    <div class="brand">${brand}</div>
                    <div class="name">${name}</div>
                    <div class="total">${Math.round(min * price)} грн</div>
                    <select onchange="this.nextElementSibling.innerText = this.options[this.selectedIndex].getAttribute('data-p') + ' грн'">${options}</select>
                    <button class="order-btn">ЗАМОВИТИ</button>
                `;
                container.appendChild(card);
            });
        } catch (e) {
            container.innerHTML = `<div class="error-msg"><b>Помилка:</b><br>${e.message}<br><br>Перевірте "Файл -> Опублікувати в інтернеті"</div>`;
        }
    }

    function showInfo(b, n, d) {
        document.getElementById('modalBrand').innerText = b;
        document.getElementById('modalName').innerText = n;
        document.getElementById('modalDesc').innerText = d || "Опис додається...";
        document.getElementById('infoModal').style.display = 'flex';
    }

    function filterCatalog() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = c.getAttribute('data-search').includes(q) ? 'flex' : 'none';
        });
    }

    loadCatalog();
</script>
</body>
</html>
