<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR-PERFUMES | Каталог</title>
    <style>
        :root { --main-color: #449244; --viber-color: #7360f2; --bg: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 10px; background: var(--bg); color: #333; -webkit-tap-highlight-color: transparent; }
        header { text-align: center; padding: 15px 0 5px; display: flex; flex-direction: column; align-items: center; }
        .logo-img { width: 100px; height: auto; margin-bottom: 10px; }
        h1 { font-size: 20px; margin: 0 0 5px; letter-spacing: 1px; text-transform: uppercase; font-weight: 900; }
        .viber-main { display: block; background: var(--viber-color); color: #fff; text-decoration: none; padding: 14px; border-radius: 12px; text-align: center; font-weight: bold; margin-bottom: 20px; font-size: 14px; box-shadow: 0 4px 15px rgba(115, 96, 242, 0.3); }
        .zoom-box { background: #f2f2f2; padding: 8px 12px; border-radius: 10px; margin-bottom: 20px; font-size: 11px; color: #777; display: flex; align-items: center; gap: 10px; }
        #range { flex-grow: 1; accent-color: #000; }
        #catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 12px; }
        .card { border: 1px solid #eee; border-radius: 15px; padding: 10px; display: flex; flex-direction: column; background: #fff; position: relative; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; margin-bottom: 8px; background: #f9f9f9; cursor: pointer; }
        .brand { font-weight: 700; text-transform: uppercase; font-size: 13px; margin-bottom: 2px; }
        .p-name { font-size: 12px; color: #666; margin-bottom: 5px; min-height: 30px; line-height: 1.2; }
        .price-per-ml { font-size: 11px; color: var(--main-color); margin-bottom: 10px; font-weight: bold; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; font-size: 14px; background: #fdfdfd; }
        .price-tag { font-size: 18px; font-weight: 800; margin-bottom: 12px; text-align: center; color: #000; }
        .order-btn { background: #000; color: #fff; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold; text-align: center; font-size: 13px; cursor: pointer; border: none; }
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; position: relative; }
        .close { position: absolute; right: 15px; top: 10px; font-size: 30px; color: #ccc; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/CxkmFFJ3/logo.png" alt="VR-PERFUMES" class="logo-img">
    <h1>VR-PERFUMES</h1>
    <p style="font-size:12px; color:#999; margin:0;">Ексклюзивний розпив • Хмельницький</p>
</header>

<div id="catalog">Завантаження ароматів...</div>

    <div class="modal-content" onclick="event.stopPropagation()">
