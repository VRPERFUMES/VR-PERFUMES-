<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR-PERFUMES | Каталог</title>
    <style>
        :root { --main: #449244; --viber: #7360f2; --bg: #f4f4f4; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 10px; background: var(--bg); color: #333; }
        
        header { text-align: center; padding: 15px; background: #fff; border-radius: 15px; margin-bottom: 10px; }
        .logo { width: 80px; height: auto; }
        
        /* ПОШУК */
        .search-box { 
            position: sticky; top: 10px; z-index: 100; 
            background: #fff; padding: 12px; border-radius: 15px; 
            margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border: 2px solid var(--viber);
        }
        #searchInput { width: 100%; padding: 10px; border: none; font-size: 16px; outline: none; box-sizing: border-box; font-weight: bold; }

        /* БАНЕР VIBER */
        .viber-channel { 
            display: block; background: var(--viber); color: #fff; 
            text-decoration: none; padding: 12px; border-radius: 12px; 
            text-align: center; font-weight: bold; margin-bottom: 15px; 
            font-size: 14px; box-shadow: 0 2px 5px rgba(115, 96, 242, 0.3);
        }
        
        #catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        
        /* КАРТКА */
        .card { position: relative; border-radius: 15px; padding: 10px; display: flex; flex-direction: column; background: #fff; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .new-badge { position: absolute; top: -5px; left: 50%; transform: translateX(-50%); background: var(--main); color: white; padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: bold; z-index: 10; border: 1px solid #fff; }
        
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; background: #f9f9f9; cursor: pointer; }
        .brand { font-weight: bold; font-size: 13px; margin-top: 10px; text-transform: uppercase; color: #000; }
        .name { font-size: 12px; color: #666; height: 32px; margin: 4px 0; overflow: hidden; }
        
        select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; background: #fff; }
        .total { font-size: 18px; font-weight: 900; margin-bottom: 10px; color: #000; }
        .order-btn { background: #000; color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* МОДАЛЬНЕ ВІКНО */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; max-width: 400px; width: 100%; position: relative; text-align: center; }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; }

        /* СПОВІЩЕННЯ */
        #copyNotice {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 25px; border-radius: 20px; z-index: 1000; text-align: center;
            width: 80%; max-width: 280px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.85); border: 3px solid var(--viber);
        }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/CxkmFFJ3/logo.png" class="logo">
    <h1 style="font-size:20px; margin:5px 0;">VR-PERFUMES</h1>
</header>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="🔎 Пошук бренду або назви..." oninput="filterCatalog()">
</div>

<a href="https://invite.viber.com/?g2=AQBjzS%2BM5uBAeFRYT57vm5okC%2BGV00WHPJgDJBWE9ptyotTAmhAhpYNBmtPwZxQe" class="viber-channel">ПРИЄДНАТИСЬ ДО VIBER-КАНАЛУ</a>

<div id="catalog">Завантаження...</div>

<div id="infoModal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="document.getElementById('infoModal').style.display='none'">&times;</span>
        <h3 id="modalBrand"></h3>
        <p id="modalName" style="color:#666;"></p>
        <hr border="0" style="height:1px; background:#eee; margin:15px 0;">
        <p id="modalDesc" style="line-height:1.6; font-size:14px; text-align:left;"></p>
    </div>
</div>

<div id="copyNotice">
    <b style="font-size: 18px; color: var(--viber);">СКОПІЙОВАНО!</b>
    <p>Відкриваємо Viber.<br>Натисніть там <b>"ВСТАВИТИ"</b></p>
</div>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpreeDVfMb9m8VoH2fWjx3-P4e2XjpeFabLSODfQIBaLcXUA9T9xWfk4v_6R89JLgR-lvd0gwEakwM/pub?gid=339534482&single=true&output=csv';
    const VIBER_NUMBER = '380962178464';

    async function loadCatalog() {
        try {
            const r = await fetch(SHEET_CSV + '&t=' + Date.now());
            const text = await r.text();
            const lines = text.split('\n').slice(1);
            const container = document.getElementById('catalog');
            container.innerHTML = '';
            
            let items = [];
            lines.forEach(line => {
                const c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
                if (c.length >= 3 && c[0]) items.push(c);
            });

            items.sort((a, b) => (new Date(b[6]) || 0) - (new Date(a[6]) || 0));

            const today = new Date();
            items.forEach(c => {
                const [brand, name, priceStr, minStr, desc, img, dateStr] = c;
                const price = parseFloat(priceStr.replace(',', '.')) || 0;
                const min = parseInt(minStr) || 2;
                const date = new Date(dateStr || 0);
                const isNew = (today - date) / (1000 * 60 * 60 * 24) <= 14;

                let options = '';
                [2, 5, 10].forEach(ml => {
                    if (ml >= min) options += `<option value="${ml}" data-p="${Math.round(ml*price)}">${ml} мл — ${Math.round(ml*price)} грн</option>`;
                });

                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-search', (brand + ' ' + name).toLowerCase());
                card.innerHTML = `
                    ${isNew ? '<div class="new-badge">Новинка!</div>' : ''}
                    <img src="${img}"
