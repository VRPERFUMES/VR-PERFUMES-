<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VR-PERFUMES | Каталог</title>
    <style>
        :root { 
            --main-color: #449244; 
            --viber-color: #7360f2; 
            --bg-color: #f4f4f7;
        }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; 
            padding: 10px; 
            background-color: var(--bg-color);
            color: #333; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        header { text-align: center; padding: 20px 0; }
        .logo-img { width: 120px; height: auto; margin-bottom: 10px; }
        h1 { font-size: 22px; margin: 0; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; }
        
        .viber-main { 
            display: block; background: var(--viber-color); color: #fff; text-decoration: none; padding: 14px; 
            border-radius: 12px; text-align: center; font-weight: bold; margin: 15px 0 25px; font-size: 14px; 
            box-shadow: 0 4px 12px rgba(115, 96, 242, 0.2);
        }
        
        .zoom-box { 
            background: #fff; padding: 8px 12px; border-radius: 10px; margin-bottom: 20px; 
            font-size: 11px; color: #777; display: flex; align-items: center; gap: 10px; border: 1px solid #ddd;
        }
        
        #range { flex-grow: 1; accent-color: #333; }
        #catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 15px; }
        
        .card { 
            border-radius: 15px; padding: 12px; display: flex; flex-direction: column; 
            background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .card img { 
            width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 10px; 
            margin-bottom: 8px; background: #eee; cursor: pointer;
            transition: opacity 0.3s;
        }
        
        .brand { font-weight: 700; text-transform: uppercase; font-size: 12px; margin-bottom: 2px; color: #000; }
        .p-name { font-size: 12px; color: #666; margin-bottom: 5px; min-height: 30px; line-height: 1.2; }
        .price-ml { font-size: 11px; color: var(--main-color); margin-bottom: 10px; font-weight: bold; background: #f0f7f0; padding: 4px; border-radius: 5px; display: inline-block; align-self: flex-start; }
        
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 10px; font-size: 13px; background: #fff; }
        .price-tag { font-size: 18px; font-weight: 800; margin-bottom: 12px; text-align: center; }
        
        .order-btn { 
            background: #000; color: #fff; text-decoration: none; padding: 12px; 
            border-radius: 8px; font-weight: bold; text-align: center; font-size: 12px; 
        }

        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #fff; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; position: relative; }
        .close { position: absolute; right: 15px; top: 10px; font-size: 30px; cursor: pointer; color: #aaa; }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/CxkmFFJ3/logo.png" alt="VR-PERFUMES" class="logo-img">
    <h1>VR-PERFUMES</h1>
</header>

<a href="https://invite.viber.com/?g2=AQBjzS%2BM5uBAeFRYT57vm5okC%2BGV00WHPJgDJBWE9ptyotTAmhAhpYNBmtPwZxQe" target="_blank" class="viber-main">ПРИЄДНАТИСЬ ДО VIBER-КАНАЛУ</a>

<div class="zoom-box">
    <span>МАСШТАБ:</span>
    <input type="range" min="140" max="280" value="165" id="range">
</div>

<div id="catalog">Завантаження ароматів...</div>

<div id="infoModal" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close" onclick="document.getElementById('infoModal').style.display='none'">&times;</span>
        <h3 id="mTitle" style="margin-top:0; border-bottom: 1px solid #eee; padding-bottom: 10px;"></h3>
        <p id="mText" style="font-size:14px; color:#444; line-height: 1.6; padding-top: 10px;"></p>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSpreeDVfMb9m8VoH2fWjx3-P4e2XjpeFabLSODfQIBaLcXUA9T9xWfk4v_6R89JLgR-lvd0gwEakwM/pub?gid=339534482&single=true&output=csv';
    const PHONE = '380962178464';

    async function loadData() {
        try {
            const res = await fetch(SHEET_URL + '&t=' + Date.now());
            const text = await res.text();
            
            // Розбиваємо CSV з урахуванням лапок
            const rows = text.split(/\r?\n/).slice(1);
            const container = document.getElementById('catalog');
            container.innerHTML = '';

            rows.forEach(row => {
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (c.length < 3) return;

                const brand = c[0].replace(/"/g, '').trim();
                const name = c[1].replace(/"/g, '').trim();
                const price = parseFloat(c[2].replace(/"/g, '').replace(',', '.'));
                
                // Перевіряємо стовпчики для нот і фото (зазвичай це 4 та 5 або 6 стовпчик)
                const notes = c[3] ? c[3].replace(/"/g, '').trim() : 'Опис очікується...';
                const img = c[c.length - 1] ? c[c.length - 1].replace(/"/g, '').trim() : '';

                if (isNaN(price)) return;

                const card = document.createElement('div');
                card.className = 'card';
                
                let options = '';
                [2, 5, 10].forEach(ml => {
                    let p = Math.round(ml * price);
                    if (ml === 10) p = Math.round(p * 0.9);
                    options += `<option value="${ml}" data-p="${p}">${ml} мл — ${p} грн</option>`;
                });

                card.innerHTML = `
                    <img src="${img || 'https://via.placeholder.com/300'}" 
                         onerror="this.src='https://via.placeholder.com/300?text=VR+PERFUMES'"
                         onclick="showInfo('${brand.replace(/'/g, "\\'")} ${name.replace(/'/g, "\\'")}', '${notes.replace(/'/g, "\\'").replace(/\n/g, "<br>")}')">
                    <div class="brand">${brand}</div>
                    <div class="p-name">${name}</div>
                    <div class="price-ml">${Math.round(price)} грн / мл</div>
                    <select onchange="this.nextElementSibling.innerText = this.options[this.selectedIndex].getAttribute('data-p') + ' грн'">${options}</select>
                    <div class="price-tag">${Math.round(2 * price)} грн</div>
                    <a href="#" class="order-btn" onclick="sendOrder('${brand} ${name}', this)">ЗАМОВИТИ</a>
                `;
                container.appendChild(card);
            });
        } catch (e) {
            document.getElementById('catalog').innerText = "Оновлення вітрини...";
        }
    }

    function showInfo(t, n) {
        document.getElementById('mTitle').innerText = t;
        document.getElementById('mText').innerHTML = n;
        document.getElementById('infoModal').style.display = 'flex';
    }

    function sendOrder(item, btn) {
        const sel = btn.previousElementSibling.previousElementSibling;
        const total = btn.previousElementSibling.innerText;
        const msg = `🛍️ НОВЕ ЗАМОВЛЕННЯ:\n──────────────────\n✨ Аромат: ${item}\n💧 Об'єм: ${sel.value} мл\n💰 Сума: ${total}\n──────────────────\nЧекаю на підтвердження!`;
        
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(msg).then(() => {
                window.location.href = `viber://chat?number=%2B${PHONE}`;
                setTimeout(() => alert("Текст замовлення скопійовано! ✅\nВставте його у Viber."), 600);
            }).catch(() => {
                window.location.href = `viber://chat?number=%2B${PHONE}`;
            });
        } else {
            window.location.href = `viber://chat?number=%2B${PHONE}`;
        }
    }

    document.getElementById('range').oninput = function() {
        document.getElementById('catalog').style.gridTemplateColumns = `repeat(auto-fill, minmax(${this.value}px, 1fr))`;
    };

    loadData();
</script>
</body>
</html>
