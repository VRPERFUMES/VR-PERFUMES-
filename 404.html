<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Сторінку не знайдено | VR Perfumes</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="https://i.postimg.cc/CxkmFFJ3/logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #c5a059;
            --gold-light: rgba(197,160,89,0.15);
            --bg: #faf8f4;
            --dark: #1a1a1a;
            --gray: #888;
        }

        body {
            background: var(--bg);
            color: var(--dark);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow: hidden;
            position: relative;
        }

        /* Фонові декоративні елементи */
        .bg-circle {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(197,160,89,0.06) 0%, transparent 70%);
            pointer-events: none;
        }
        .bg-circle-1 { width: 600px; height: 600px; top: -200px; right: -200px; }
        .bg-circle-2 { width: 400px; height: 400px; bottom: -100px; left: -100px; }

        /* Логотип */
        .logo {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .logo img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            opacity: 0.9;
        }
        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--dark);
        }

        /* Головний контент */
        .content {
            text-align: center;
            max-width: 480px;
            position: relative;
            z-index: 1;
        }

        /* 404 велике число */
        .number {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(100px, 25vw, 180px);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -8px;
            background: linear-gradient(135deg, rgba(197,160,89,0.15) 0%, rgba(197,160,89,0.05) 100%);
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-stroke: 1px rgba(197,160,89,0.3);
            position: relative;
            margin-bottom: -10px;
            user-select: none;
        }

        /* Флакон парфумів у центрі числа */
        .bottle-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.7;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(-50%, -50%) translateY(0); }
            50%       { transform: translate(-50%, -50%) translateY(-12px); }
        }

        /* Роздільник */
        .divider {
            width: 40px;
            height: 1px;
            background: var(--gold);
            margin: 20px auto;
            opacity: 0.5;
        }

        /* Підзаголовок */
        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 12px;
        }

        /* Основний текст */
        .title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(18px, 4vw, 24px);
            font-weight: 700;
            color: var(--dark);
            line-height: 1.3;
            margin-bottom: 12px;
        }

        .description {
            font-size: 14px;
            color: var(--gray);
            line-height: 1.6;
            margin-bottom: 36px;
        }

        /* Кнопки */
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--dark);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 4px;
            transition: all 0.25s ease;
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(197,160,89,0.25);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            color: var(--dark);
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            padding: 13px 28px;
            border-radius: 4px;
            border: 1px solid rgba(197,160,89,0.3);
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .btn-secondary:hover {
            border-color: var(--gold);
            color: var(--gold);
            transform: translateY(-2px);
        }

        /* Підказка внизу */
        .hint {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: var(--gray);
            letter-spacing: 0.5px;
            white-space: nowrap;
            opacity: 0.6;
        }

        /* Аромати що "випаровуються" */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            bottom: -20px;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
            animation: rise var(--dur, 6s) var(--delay, 0s) infinite ease-in;
        }

        @keyframes rise {
            0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
            10%  { opacity: 0.4; }
            90%  { opacity: 0.1; }
            100% { transform: translateY(-100vh) translateX(var(--drift, 30px)) scale(0.2); opacity: 0; }
        }

        /* Темна тема */
        @media (prefers-color-scheme: dark) {
            :root { --bg: #0f0e0c; --dark: #f5f5f5; --gray: #777; }
            .btn-primary { background: var(--gold); }
            .btn-primary:hover { background: #d4ae6a; }
            .logo-text { color: var(--dark); }
        }

        /* Анімація появи */
        .content { animation: fadeUp 0.7s ease both; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Фонові кола -->
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>

    <!-- Частинки-аромати -->
    <div class="particles" id="particles"></div>

    <!-- Логотип -->
    <a href="https://vrperfumes.github.io/VR-PERFUMES-/" class="logo">
        <img src="https://i.postimg.cc/CxkmFFJ3/logo.png" alt="VR Perfumes">
        <span class="logo-text">VR Perfumes</span>
    </a>

    <!-- Контент -->
    <div class="content">

        <!-- 404 з флаконом -->
        <div class="number" aria-hidden="true">
            404
            <div class="bottle-icon">
                <svg width="48" height="60" viewBox="0 0 48 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="18" y="2" width="12" height="6" rx="2" fill="rgba(197,160,89,0.4)"/>
                    <rect x="20" y="0" width="8" height="4" rx="1" fill="rgba(197,160,89,0.6)"/>
                    <path d="M12 10 Q6 18 6 28 L6 48 Q6 54 12 54 L36 54 Q42 54 42 48 L42 28 Q42 18 36 10 Z" fill="rgba(197,160,89,0.12)" stroke="rgba(197,160,89,0.4)" stroke-width="1"/>
                    <path d="M16 28 Q16 22 24 20 Q32 22 32 28" stroke="rgba(197,160,89,0.3)" stroke-width="1" fill="none"/>
                    <ellipse cx="24" cy="38" rx="8" ry="3" fill="rgba(197,160,89,0.08)"/>
                </svg>
            </div>
        </div>

        <div class="divider"></div>

        <div class="subtitle">Сторінку не знайдено</div>

        <h1 class="title">Цей аромат<br>зник з колекції</h1>

        <p class="description">
            Схоже, сторінка яку ви шукаєте більше не існує або була переміщена.<br>
            Але наша колекція ароматів — завжди на місці.
        </p>

        <div class="actions">
            <a href="https://vrperfumes.github.io/VR-PERFUMES-/" class="btn-primary">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                До каталогу
            </a>
            <button class="btn-secondary" onclick="history.back()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                Назад
            </button>
        </div>

    </div>

    <p class="hint">vrperfumes.github.io</p>

    <script>
        // Генеруємо частинки-аромати
        const container = document.getElementById('particles');
        const count = 18;
        for (let i = 0; i < count; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.setProperty('--dur', (5 + Math.random() * 8) + 's');
            p.style.setProperty('--delay', (Math.random() * 6) + 's');
            p.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
            p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
            container.appendChild(p);
        }

        // Авто-повернення через 30 секунд
        let countdown = 30;
        const hint = document.querySelector('.hint');
        const timer = setInterval(() => {
            countdown--;
            hint.textContent = `Перехід на головну через ${countdown}с`;
            if (countdown <= 0) {
                clearInterval(timer);
                window.location.href = 'https://vrperfumes.github.io/VR-PERFUMES-/';
            }
        }, 1000);

        // Якщо клієнт натиснув — зупиняємо таймер
        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('click', () => clearInterval(timer));
        });
    </script>
</body>
</html>
